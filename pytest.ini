[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short

markers =
    smoke: service reachability and version checks
    contract: API behaviour contract tests
    security: injection, cookie, and header hardening tests
    performance: response time baseline assertions (p95 SLA)
    batch: reconciliation job unit and integration tests
    idempotency: verify re-runs produce identical outputs
    data_integrity: migration data correctness tests
    e2e: full user journey across all layers
