name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test pyramid (${{ matrix.suite }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true          # lower layer failure stops upper layers
      matrix:
        include:
          - suite: smoke
            path: tests/smoke/
            order: 1
          - suite: contract
            path: tests/contract/
            order: 2
          - suite: batch
            path: tests/batch/
            order: 3
          - suite: data-integrity
            path: tests/data-integrity/
            order: 4

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: contoso
          POSTGRES_USER: contoso_user
          POSTGRES_PASSWORD: changeme_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contoso_user -d contoso"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: changeme_local
        ports:
          - 9000:9000
        options: >-
          --health-cmd "mc ready local || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        volumes:
          - /tmp/minio-data:/data
        # minio server /data --console-address ":9001"
        # GitHub Actions services don't support custom commands; use docker-compose for minio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Start stack via docker compose
        run: |
          docker compose up -d --wait
          docker compose ps

      - name: Apply DB migrations (Flyway)
        run: |
          docker run --rm \
            --network host \
            -e FLYWAY_URL="jdbc:postgresql://localhost:5432/contoso" \
            -e FLYWAY_USER="contoso_user" \
            -e FLYWAY_PASSWORD="changeme_local" \
            -v ${{ github.workspace }}/workloads/reporting-db/migrations:/flyway/sql \
            flyway/flyway:10 migrate

      - name: Run ${{ matrix.suite }} tests
        env:
          WEB_APP_URL: http://localhost:5000
          DATABASE_URL: postgresql://contoso_user:changeme_local@localhost:5432/contoso
          REDIS_URL: redis://localhost:6379
          S3_ENDPOINT_URL: http://localhost:9000
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: changeme_local
          S3_BUCKET_OUTPUT: reconciliation-output
        run: |
          pytest ${{ matrix.path }} -v --tb=short --junitxml=test-results-${{ matrix.suite }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.suite }}
          path: test-results-${{ matrix.suite }}.xml

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy types-requests psycopg2-binary redis boto3 flask

      - name: Ruff lint
        run: ruff check workloads/ tests/

      - name: Type check (mypy)
        run: |
          mypy workloads/web-app/app.py workloads/web-app/config.py \
               workloads/batch-reconciliation/reconcile.py \
               --ignore-missing-imports --no-strict-optional

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module: [shared, web-app, batch, reporting]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform init (no backend)
        working-directory: infra/${{ matrix.module }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/${{ matrix.module }}
        run: terraform validate

      - name: Terraform fmt check
        working-directory: infra/${{ matrix.module }}
        run: terraform fmt -check -recursive

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Run Checkov (IaC security)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/
          framework: terraform
          soft_fail: true          # advisory only — findings go to Security Review doc
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
